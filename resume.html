<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume | Deepanshu Malik — AI Practice Lead</title>

  <meta name="description" content="View and download Deepanshu Malik's resume. AI Practice Lead with 5+ years in production systems — AI agents, RAG, Python, FastAPI, AWS, Kubernetes (CKA certified).">
  <meta name="author" content="Deepanshu Malik">
  <meta name="theme-color" content="#191410">
  <link rel="canonical" href="https://deepanshu-malik.github.io/resume.html">

  <link rel="icon" type="image/x-icon" href="/assets/images/favicon.ico">
  <link rel="icon" type="image/svg+xml" href="/assets/images/favicon.svg">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/apple-touch-icon.png">

  <meta property="og:type" content="profile">
  <meta property="og:url" content="https://deepanshu-malik.github.io/resume.html">
  <meta property="og:title" content="Resume | Deepanshu Malik — AI Practice Lead">
  <meta property="og:description" content="AI Practice Lead with 5+ years in production systems — AI agents, RAG, Python, FastAPI, AWS, Kubernetes (CKA).">
  <meta property="og:image" content="https://deepanshu-malik.github.io/assets/images/og-image.png">

  <style>
    @font-face {
      font-family: 'Bricolage Grotesque';
      font-style: normal;
      font-weight: 400 800;
      font-display: swap;
      src: url('/assets/fonts/bricolage-var.woff2') format('woff2');
    }
    @font-face {
      font-family: 'IBM Plex Mono';
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: url('/assets/fonts/plex-mono-400.woff2') format('woff2');
    }
    @font-face {
      font-family: 'IBM Plex Mono';
      font-style: normal;
      font-weight: 500;
      font-display: swap;
      src: url('/assets/fonts/plex-mono-500.woff2') format('woff2');
    }

    :root {
      --bg0: #191410;
      --bg1: #211a13;
      --panel: #281f16;
      --line: #3d3225;
      --line-soft: #2e251a;
      --text: #ede2ce;
      --muted: #a3907a;
      --faint: #6f6152;
      --copper: #d4772b;
      --copper-hi: #e99a55;
      --font-display: 'Bricolage Grotesque', system-ui, sans-serif;
      --font-mono: 'IBM Plex Mono', ui-monospace, monospace;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg0: #f2e9da;
        --bg1: #f7f0e3;
        --panel: #fbf5ea;
        --line: #d8c9b0;
        --line-soft: #e4d8c2;
        --text: #271e12;
        --muted: #7a6a55;
        --faint: #9b8a71;
        --copper: #b05e17;
        --copper-hi: #93490c;
      }
    }
    :root[data-theme='dark'] {
      --bg0: #191410; --bg1: #211a13; --panel: #281f16; --line: #3d3225;
      --line-soft: #2e251a; --text: #ede2ce; --muted: #a3907a; --faint: #6f6152;
      --copper: #d4772b; --copper-hi: #e99a55;
    }
    :root[data-theme='light'] {
      --bg0: #f2e9da; --bg1: #f7f0e3; --panel: #fbf5ea; --line: #d8c9b0;
      --line-soft: #e4d8c2; --text: #271e12; --muted: #7a6a55; --faint: #9b8a71;
      --copper: #b05e17; --copper-hi: #93490c;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-display);
      background: var(--bg0);
      color: var(--text);
      line-height: 1.6;
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
    }
    .container { max-width: 860px; margin: 0 auto; padding: 0 24px; }
    a { color: inherit; text-decoration: none; }
    :focus-visible { outline: 2px solid var(--copper); outline-offset: 3px; }

    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: var(--bg0);
      border-bottom: 1px solid var(--line-soft);
      padding: 14px 0;
    }
    .nav-inner { display: flex; justify-content: space-between; align-items: center; }
    .brand { display: flex; align-items: center; gap: 0.6em; font-weight: 700; }
    .brand .node-square {
      width: 10px; height: 10px;
      border: 2px solid var(--copper);
      transform: rotate(45deg);
    }
    .nav-links { display: flex; gap: 20px; }
    .nav-links a {
      font-family: var(--font-mono); font-size: 12.5px;
      letter-spacing: 0.05em; color: var(--muted);
    }
    .nav-links a:hover, .nav-links a.active { color: var(--copper); }

    section { padding: 110px 0 60px; }
    .resume-header { margin-bottom: 40px; }
    .resume-header .eyebrow {
      font-family: var(--font-mono); font-size: 11px; font-weight: 500;
      letter-spacing: 0.12em; text-transform: uppercase; color: var(--faint);
      margin-bottom: 10px;
    }
    .resume-header h1 { font-size: 34px; font-weight: 800; letter-spacing: -0.02em; line-height: 1.1; }
    .resume-header .title { color: var(--copper); font-size: 16px; font-weight: 600; margin: 6px 0 14px; }
    .resume-header .contact-info { color: var(--muted); font-size: 13px; line-height: 1.8; font-family: var(--font-mono); }
    .resume-header .contact-info a:hover { color: var(--copper); }

    .resume-section { margin-bottom: 36px; }
    .resume-section h2 {
      font-family: var(--font-mono); font-size: 12px; font-weight: 500;
      letter-spacing: 0.14em; text-transform: uppercase; color: var(--copper);
      border-bottom: 1px solid var(--line); padding-bottom: 8px; margin-bottom: 18px;
    }
    .resume-item { margin-bottom: 22px; }
    .resume-item-header { display: flex; justify-content: space-between; margin-bottom: 2px; flex-wrap: wrap; gap: 8px; }
    .resume-item h3 { font-size: 16px; font-weight: 700; }
    .resume-item .company { color: var(--muted); font-weight: 600; }
    .resume-item .location { color: var(--faint); font-size: 12px; }
    .resume-item .company-context { color: var(--faint); font-size: 12px; font-style: italic; margin: 2px 0 4px; }
    .resume-item .date { color: var(--faint); font-size: 12.5px; font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
    .resume-item .description { color: var(--muted); font-size: 13.5px; margin-top: 6px; }
    .resume-item ul { margin: 6px 0 0 18px; color: var(--muted); font-size: 13.5px; }
    .resume-item li { margin-bottom: 4px; }
    .resume-item li strong, .summary-text strong { color: var(--text); font-weight: 600; }
    .resume-item .tech { color: var(--faint); font-size: 12px; margin-top: 5px; font-family: var(--font-mono); }
    .skills-grid { display: grid; gap: 10px; }
    .skill-category-name { color: var(--text); font-size: 13.5px; font-weight: 700; }
    .skill-category-items { color: var(--muted); font-size: 13.5px; }
    .summary-text { color: var(--muted); font-size: 14px; max-width: 72ch; }
    .additional-info { color: var(--muted); font-size: 13.5px; }
    .additional-info p { margin-bottom: 4px; }
    .additional-info strong { color: var(--text); }
    .project-link { color: var(--copper); font-size: 12px; font-family: var(--font-mono); }

    .btn {
      display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px;
      border: 1px solid var(--line); border-radius: 3px; color: var(--text);
      font-family: var(--font-mono); font-size: 12.5px; letter-spacing: 0.05em;
      text-transform: uppercase; background: transparent; cursor: pointer;
      transition: border-color 0.2s, background 0.2s, color 0.2s;
    }
    .btn:hover { border-color: var(--copper); color: var(--copper); }
    .btn--primary { background: var(--copper); border-color: var(--copper); color: var(--bg0); }
    .btn--primary:hover { background: var(--copper-hi); border-color: var(--copper-hi); color: var(--bg0); }
    .actions { margin-top: 40px; display: flex; gap: 14px; flex-wrap: wrap; }
    footer {
      padding: 28px 0; border-top: 1px solid var(--line-soft);
      color: var(--faint); font-size: 12px; font-family: var(--font-mono);
    }

    /* ——— ATS/print: plain, machine-readable ——— */
    @media print {
      nav, .actions, footer { display: none; }
      section { padding: 10px 0; }
      body { background: white; color: #000; font-size: 9pt; font-family: Arial, Helvetica, sans-serif; line-height: 1.4; }
      .container { max-width: 100%; }
      .resume-header { margin-bottom: 18px; }
      .resume-header .eyebrow { display: none; }
      .resume-header h1 { font-size: 18pt; color: #000; font-weight: 700; font-family: Georgia, 'Times New Roman', serif; }
      .resume-header .title { color: #333; font-weight: 500; font-size: 10pt; font-family: Georgia, 'Times New Roman', serif; }
      .resume-header .contact-info { color: #222; font-size: 8pt; font-family: Arial, sans-serif; }
      .resume-header .contact-info a { color: #222; text-decoration: none; }
      .resume-section { margin-bottom: 18px; }
      .resume-section h2 { color: #000; border-color: #333; font-size: 11pt; font-weight: 700; font-family: Georgia, 'Times New Roman', serif; margin-bottom: 6px; letter-spacing: 0; }
      .summary-text { color: #222 !important; font-size: 9pt !important; max-width: none; }
      .summary-text strong, .resume-item li strong { color: #000; }
      .resume-item { margin-bottom: 10px; }
      .resume-item h3 { font-size: 9pt; color: #000; font-weight: 600; }
      .resume-item .company { color: #111; font-weight: 500; }
      .resume-item .location, .resume-item .date { color: #444; font-size: 8pt; font-family: Arial, sans-serif; }
      .resume-item .company-context { color: #555; font-size: 8pt; font-style: italic; }
      .resume-item ul, .resume-item .description { color: #222; font-size: 9pt; }
      .resume-item .tech { color: #444; font-size: 8pt; font-family: Arial, sans-serif; }
      .resume-item a, .project-link { font-size: 8pt !important; color: #333; }
      .skills-grid { line-height: 1.1; }
      .skill-category-name { color: #000; font-weight: 600; font-size: 9pt; }
      .skill-category-items { color: #222; font-size: 9pt; }
      .additional-info, .additional-info p { color: #222; font-size: 9pt; margin-bottom: 2px; }
      .additional-info strong { color: #000; font-weight: 600; }
      a:link, a:visited, a:hover, a:active { color: #222 !important; text-decoration: none !important; }
    }
    @media (max-width: 700px) { .nav-links { display: none; } }
  </style>
</head>
<body>
  <nav>
    <div class="container nav-inner">
      <a href="/" class="brand"><span class="node-square"></span><span>deepanshu malik</span></a>
      <div class="nav-links">
        <a href="/#profile">profile</a>
        <a href="/#log">deploy-log</a>
        <a href="/#services">services</a>
        <a href="/#dispatch">contact</a>
        <a href="/resume.html" class="active">resume</a>
      </div>
    </div>
  </nav>

  <section>
    <div class="container">
      <div class="resume-header">
        <p class="eyebrow">curriculum vitae · pdf-ready</p>
        <h1 id="name"></h1>
        <p class="title" id="title"></p>
        <div class="contact-info" id="contact-info"></div>
      </div>

      <div class="resume-section">
        <h2>Summary</h2>
        <p class="summary-text" id="summary"></p>
      </div>

      <div class="resume-section">
        <h2>Skills</h2>
        <div class="skills-grid" id="skills"></div>
      </div>

      <div class="resume-section">
        <h2>Experience</h2>
        <div id="experience"></div>
      </div>

      <div class="resume-section">
        <h2>Projects</h2>
        <div id="projects"></div>
      </div>

      <div class="resume-section">
        <h2>Education</h2>
        <div id="education"></div>
      </div>

      <div class="resume-section">
        <h2>Certifications</h2>
        <div id="certifications"></div>
      </div>

      <div class="resume-section">
        <h2>Additional</h2>
        <div class="additional-info" id="additional"></div>
      </div>

      <div class="actions">
        <button onclick="window.print()" class="btn btn--primary">Print / Save PDF</button>
        <a href="/" class="btn">← Back to the system</a>
      </div>
    </div>
  </section>

  <footer><div class="container"><p>© 2026 deepanshu malik</p></div></footer>

  <script>
    const stored = localStorage.getItem('theme')
    if (stored) document.documentElement.dataset.theme = stored

    fetch('/data/resume-data.json')
      .then(r => r.json())
      .then(data => {
        const p = data.personal;
        document.getElementById('name').textContent = p.name;
        document.getElementById('title').textContent = p.title;
        document.getElementById('contact-info').innerHTML = `
          <a href="mailto:${p.email}">${p.email}</a> • ${p.phone} • ${p.location}<br>
          <a href="${p.linkedin.url}" target="_blank" rel="noopener">${p.linkedin.display}</a> •
          <a href="${p.github.url}" target="_blank" rel="noopener">${p.github.display}</a> •
          <a href="${p.website.url}" target="_blank" rel="noopener">${p.website.display}</a><br>
          ${p.relocation}
        `;
        document.getElementById('summary').innerHTML = data.summary;

        document.getElementById('skills').innerHTML = data.skills.map(s => `
          <div class="skill-category">
            <span class="skill-category-name">${s.category}:</span>
            <span class="skill-category-items">${s.items}</span>
          </div>
        `).join('');

        document.getElementById('experience').innerHTML = data.experience.map(exp => `
          <div class="resume-item">
            <div class="resume-item-header">
              <div>
                <h3>${exp.title}</h3>
                <span class="company">${exp.company}</span>
                <span class="location"> • ${exp.location} (${exp.type})</span>
              </div>
              <span class="date">${exp.startDate} — ${exp.endDate}</span>
            </div>
            ${exp.companyContext ? `<p class="company-context">${exp.companyContext}</p>` : ''}
            <ul>${exp.achievements.map(a => `<li>${a}</li>`).join('')}</ul>
          </div>
        `).join('');

        document.getElementById('projects').innerHTML = data.projects.map(proj => `
          <div class="resume-item">
            <div class="resume-item-header">
              <h3>${proj.title}</h3>
              <a href="${proj.url}" target="_blank" rel="noopener" class="project-link">${proj.displayUrl}</a>
            </div>
            <p class="description">${proj.description}</p>
            <p class="tech">Tech: ${proj.technologies}</p>
          </div>
        `).join('');

        document.getElementById('education').innerHTML = data.education.map(edu => `
          <div class="resume-item">
            <div class="resume-item-header">
              <h3>${edu.degree}</h3>
              <span class="date">${edu.startYear} — ${edu.endYear}</span>
            </div>
            <span class="company">${edu.institution}</span>
          </div>
        `).join('');

        document.getElementById('certifications').innerHTML = data.certifications.map(cert => `
          <div class="resume-item">
            <h3>${cert.name} (${cert.shortName})</h3>
            <span class="company">${cert.issuer} • ${cert.issueDate}</span>
          </div>
        `).join('');

        const add = data.additional;
        document.getElementById('additional').innerHTML = `
          <p><strong>Languages:</strong> ${add.languages}</p>
          <p><strong>Availability:</strong> ${add.availability}</p>
          ${add.visaStatus ? `<p><strong>Work Authorization:</strong> ${add.visaStatus}</p>` : ''}
        `;
      });
  </script>
</body>
</html>
