<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — no handler for this route | Deepanshu Malik</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="/assets/images/favicon.svg">
  <style>
    @font-face {
      font-family: 'Bricolage Grotesque';
      font-style: normal;
      font-weight: 400 800;
      font-display: swap;
      src: url('/assets/fonts/bricolage-var.woff2') format('woff2');
    }
    @font-face {
      font-family: 'IBM Plex Mono';
      font-style: normal;
      font-weight: 500;
      font-display: swap;
      src: url('/assets/fonts/plex-mono-500.woff2') format('woff2');
    }
    :root {
      --bg0: #191410; --panel: #281f16; --line: #3d3225; --text: #ede2ce;
      --muted: #a3907a; --faint: #6f6152; --copper: #d4772b; --err: #c96f5e;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg0: #f2e9da; --panel: #fbf5ea; --line: #d8c9b0; --text: #271e12;
        --muted: #7a6a55; --faint: #9b8a71; --copper: #b05e17; --err: #b0523f;
      }
    }
    :root[data-theme='dark'] {
      --bg0: #191410; --panel: #281f16; --line: #3d3225; --text: #ede2ce;
      --muted: #a3907a; --faint: #6f6152; --copper: #d4772b; --err: #c96f5e;
    }
    :root[data-theme='light'] {
      --bg0: #f2e9da; --panel: #fbf5ea; --line: #d8c9b0; --text: #271e12;
      --muted: #7a6a55; --faint: #9b8a71; --copper: #b05e17; --err: #b0523f;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Bricolage Grotesque', system-ui, sans-serif;
      background: var(--bg0); color: var(--text);
      min-height: 100svh; display: grid; place-items: center; padding: 24px;
    }
    .box { max-width: 560px; }
    .mono {
      font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 500;
      letter-spacing: 0.1em; text-transform: uppercase; color: var(--faint);
    }
    h1 { font-size: clamp(2.4rem, 8vw, 4.5rem); font-weight: 800; letter-spacing: -0.03em; line-height: 1.05; margin: 14px 0 18px; }
    h1 span { color: var(--err); }
    p { color: var(--muted); margin-bottom: 28px; }
    .log {
      font-family: 'IBM Plex Mono', monospace; font-size: 12.5px;
      background: var(--panel); border: 1px solid var(--line); border-left: 3px solid var(--err);
      border-radius: 3px; padding: 14px 16px; margin-bottom: 28px; color: var(--muted);
      line-height: 1.8; overflow-x: auto; white-space: nowrap;
    }
    .log b { color: var(--err); font-weight: 500; }
    .log i { color: var(--copper); font-style: normal; }
    a.btn {
      display: inline-block; padding: 12px 22px; background: var(--copper);
      color: var(--bg0); text-decoration: none; border-radius: 3px;
      font-family: 'IBM Plex Mono', monospace; font-size: 12.5px;
      letter-spacing: 0.05em; text-transform: uppercase;
    }
  </style>
</head>
<body>
  <main class="box">
    <p class="mono">deepanshu.system · router</p>
    <h1><span>404</span> — no handler for this route.</h1>
    <div class="log">
      <b>ERR</b> route not matched · intent unresolved<br>
      <i>→</i> message moved to dead-letter queue<br>
      <i>→</i> retry with a known-good route: <i>/</i>
    </div>
    <p>The pipeline has no node registered at this address. Everything that exists routes from the homepage.</p>
    <a class="btn" href="/">← back to intake</a>
  </main>
  <script>
    const t = localStorage.getItem('theme')
    if (t) document.documentElement.dataset.theme = t
  </script>
</body>
</html>
